<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カードを引く — 扉と羅針盤</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F5F1EB;--warm:#EDE7DC;--mouve:#C4B0C0;
      --dust:#B6A99A;--ink:#2A2622;--ink-mid:#4A443E;
      --ink-lt:#7A7068;--gold:#C9A96E;
    }
    html{scroll-behavior:smooth}
    body{background:var(--cream);color:var(--ink);font-family:'Noto Serif JP',serif;font-weight:200;overflow-x:hidden;cursor:none;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9000}

    /* Cursor */
    .cursor{position:fixed;width:7px;height:7px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s ease}
    .cursor-ring{position:fixed;width:34px;height:34px;border:1px solid var(--mouve);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:border-color .3s,transform .3s}

    /* Nav */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:26px 56px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(245,241,235,0.95),transparent)}
    .nav-logo{font-size:13px;letter-spacing:.25em;color:var(--ink-mid);text-decoration:none}
    .nav-logo span{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.15em;color:var(--ink-lt);margin-left:14px}
    .nav-links{display:flex;gap:44px;list-style:none}
    .nav-links a{font-size:11px;letter-spacing:.3em;color:var(--ink-lt);text-decoration:none;position:relative;transition:color .3s}
    .nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width .4s cubic-bezier(.25,.46,.45,.94)}
    .nav-links a:hover{color:var(--ink)}.nav-links a:hover::after{width:100%}

    /* Page Header */
    .page-header{padding:140px 80px 60px;text-align:center}
    .page-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;letter-spacing:.45em;color:var(--gold);margin-bottom:24px;display:block;opacity:0;animation:fadeUp 1s ease .2s forwards}
    .page-title{font-weight:200;font-size:clamp(32px,4vw,52px);line-height:1.6;letter-spacing:.16em;margin-bottom:16px;opacity:0;animation:fadeUp 1s ease .4s forwards}
    .page-desc{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;letter-spacing:.15em;color:var(--ink-lt);opacity:0;animation:fadeUp 1s ease .6s forwards}

    /* Mode Selector */
    .mode-selector{display:flex;justify-content:center;gap:2px;margin:48px 0;opacity:0;animation:fadeUp 1s ease .8s forwards}
    .mode-btn{font-family:'Noto Serif JP',serif;font-weight:200;font-size:11px;letter-spacing:.35em;color:var(--ink-lt);background:none;border:1px solid rgba(182,169,154,.3);padding:14px 32px;cursor:none;transition:all .3s}
    .mode-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
    .mode-btn:hover:not(.active){border-color:var(--gold);color:var(--ink)}

    /* Instruction */
    .instruction{text-align:center;margin-bottom:56px;opacity:0;animation:fadeUp 1s ease 1s forwards}
    .instruction p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;letter-spacing:.2em;color:var(--dust)}

    /* Card Grid */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:16px;max-width:1100px;margin:0 auto;padding:0 80px 120px}

    /* Card */
    .card-wrap{perspective:1000px;cursor:none}
    .card-flip{width:100%;aspect-ratio:2/3.5;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1);border-radius:6px}
    .card-wrap.flipped .card-flip{transform:rotateY(180deg)}
    .card-wrap.reversed .card-flip{transform:rotateY(180deg) rotateZ(180deg)}

    .card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:6px;overflow:hidden}

    /* Card Back */
    .card-back{
      background:linear-gradient(145deg,#2A2622,#3D3530);
      border:1px solid rgba(201,169,110,.25);
      display:flex;align-items:center;justify-content:center;
      transition:box-shadow .3s,transform .2s;
      box-shadow:0 8px 24px rgba(42,38,34,.2);
    }
    .card-wrap:not(.flipped):hover .card-back{
      box-shadow:0 20px 48px rgba(42,38,34,.3);
      transform:translateY(-6px);
    }
    .card-back-pattern{
      position:absolute;inset:0;
      background-image:
        repeating-linear-gradient(45deg,rgba(201,169,110,.06) 0px,rgba(201,169,110,.06) 1px,transparent 1px,transparent 10px),
        repeating-linear-gradient(-45deg,rgba(201,169,110,.06) 0px,rgba(201,169,110,.06) 1px,transparent 1px,transparent 10px);
    }
    .card-back-border{position:absolute;inset:6px;border:1px solid rgba(201,169,110,.2);border-radius:3px}
    .card-back-sym{font-family:'Cormorant Garamond',serif;font-size:28px;color:rgba(201,169,110,.5);position:relative;z-index:1}

    /* Card Front */
    .card-front{
      transform:rotateY(180deg);
      background:var(--cream);
      border:1px solid rgba(201,169,110,.3);
      box-shadow:0 12px 40px rgba(42,38,34,.18);
      display:flex;flex-direction:column;
    }
    .card-img-wrap{flex:1;overflow:hidden;position:relative}
    .card-img-wrap img{
      width:100%;height:100%;object-fit:cover;
      display:block;
      filter:sepia(15%) contrast(95%) brightness(102%);
      transition:transform .5s ease;
    }
    .card-wrap:hover .card-img-wrap img{transform:scale(1.04)}
    .card-label{
      padding:8px 10px;text-align:center;
      background:linear-gradient(to bottom,rgba(245,241,235,.97),var(--cream));
      border-top:1px solid rgba(201,169,110,.2);
    }
    .card-label-name{font-size:9px;letter-spacing:.25em;color:var(--ink-mid);display:block}
    .card-label-num{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:8px;letter-spacing:.2em;color:var(--dust)}

    /* Overlay */
    .overlay{
      position:fixed;inset:0;z-index:500;
      background:rgba(42,38,34,.75);
      backdrop-filter:blur(12px);
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .5s ease;
      padding:24px;
    }
    .overlay.open{opacity:1;pointer-events:all}

    .modal{
      background:var(--cream);
      max-width:720px;width:100%;
      display:grid;grid-template-columns:240px 1fr;
      border-radius:4px;
      overflow:hidden;
      transform:translateY(24px) scale(.97);
      transition:transform .5s cubic-bezier(.25,.46,.45,.94);
      box-shadow:0 60px 120px rgba(42,38,34,.4);
      max-height:90vh;
    }
    .overlay.open .modal{transform:translateY(0) scale(1)}

    .modal-card{background:linear-gradient(145deg,#2A2622,#3A3028);display:flex;align-items:center;justify-content:center;padding:32px;position:relative}
    .modal-card-img{width:100%;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,.5);filter:sepia(10%) contrast(96%) brightness(104%)}
    .modal-card.reversed .modal-card-img{transform:rotate(180deg)}

    .modal-body{padding:48px 44px;overflow-y:auto;display:flex;flex-direction:column;gap:24px}
    .modal-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.45em;color:var(--gold)}
    .modal-title{font-weight:200;font-size:clamp(22px,3vw,32px);letter-spacing:.18em;line-height:1.5}
    .modal-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;letter-spacing:.2em;color:var(--ink-lt)}
    .modal-divider{width:40px;height:1px;background:var(--mouve)}
    .modal-section-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.4em;color:var(--gold);margin-bottom:10px;display:block}
    .modal-text{font-size:13px;line-height:2.5;letter-spacing:.08em;color:var(--ink-mid)}
    .modal-keywords{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
    .kw{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;letter-spacing:.15em;color:var(--ink-lt);border:1px solid rgba(182,169,154,.4);padding:4px 12px;border-radius:2px}
    .modal-close{position:absolute;top:20px;right:24px;background:none;border:none;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;letter-spacing:.3em;color:var(--dust);cursor:none;transition:color .3s}
    .modal-close:hover{color:var(--ink)}

    /* Reversed badge */
    .rev-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.3em;color:var(--mouve);border:1px solid var(--mouve);padding:4px 14px;border-radius:2px;width:fit-content}

    /* Animations */
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* Responsive */
    @media(max-width:768px){
      /* カーソル非表示（タッチ操作には不要） */
      .cursor, .cursor-ring { display: none; }
      body { cursor: auto; }
      a, button, .card-wrap, .spread-card { cursor: pointer; }

      /* ナビ */
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .nav-logo span { display: none; }

      /* ページヘッダー */
      .page-header { padding: 90px 24px 40px; }
      .page-title { font-size: 28px; }
      .page-desc { font-size: 13px; }

      /* モード切替ボタン */
      .mode-selector { margin: 32px 16px; }
      .mode-btn { padding: 12px 20px; font-size: 10px; }

      /* 説明文 */
      .instruction { margin-bottom: 32px; padding: 0 24px; }

      /* カードグリッド */
      .card-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        padding: 0 16px 80px;
      }

      /* モーダル */
      .overlay { padding: 0; align-items: flex-end; }
      .modal {
        grid-template-columns: 1fr;
        max-height: 92vh;
        border-radius: 16px 16px 0 0;
        width: 100%;
      }
      .modal-card {
        padding: 28px 40px 20px;
        max-height: 280px;
      }
      .modal-card-img {
        max-height: 220px;
        width: auto;
        margin: 0 auto;
        display: block;
      }
      .modal-body {
        padding: 24px 24px 40px;
        gap: 16px;
        overflow-y: auto;
        max-height: calc(92vh - 280px);
      }
      .modal-title { font-size: 22px; }
      .modal-close {
        position: fixed;
        top: auto;
        bottom: calc(92vh + 8px);
        right: 16px;
        color: var(--cream);
      }
    }
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      width: 40px; height: 40px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 200;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px; height: 1px;
      background: var(--ink-mid);
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .mobile-menu {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(245,241,235,0.98);
      backdrop-filter: blur(12px);
      z-index: 150;
      padding: 90px 48px 48px;
      transform: translateY(-100%);
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
      border-bottom: 1px solid rgba(182,169,154,0.3);
    }
    .mobile-menu.open { transform: translateY(0); }
    .mobile-menu ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .mobile-menu ul li {
      border-bottom: 1px solid rgba(182,169,154,0.2);
    }
    .mobile-menu ul li a {
      display: block;
      font-family: 'Noto Serif JP', serif;
      font-weight: 200;
      font-size: 15px;
      letter-spacing: 0.3em;
      color: var(--ink-mid);
      text-decoration: none;
      padding: 20px 0;
      transition: color 0.3s, padding-left 0.3s;
    }
    .mobile-menu ul li a:hover { color: var(--ink); padding-left: 8px; }

    @media(max-width:880px) {
      .hamburger { display: flex; }
      .nav-links { display: none !important; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="ring"></div>

<nav>
  <a href="index.html" class="nav-logo">扉と羅針盤<span>Tobira to Rashinban</span></a>
  <ul class="nav-links">
    <li><a href="tarot.html" style="color:var(--ink)">カードを引く</a></li>

    <li><a href="#">コラム</a></li>
    <li><a href="#">ショップ</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="メニュー">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <ul>
    <li><a href="index.html" onclick="closeMenu()">トップページ</a></li>
    <li><a href="tarot.html" onclick="closeMenu()">カードを引く</a></li>
    <li><a href="cards.html" onclick="closeMenu()">カード解説</a></li>
    <li><a href="#" onclick="closeMenu()">コラム</a></li>
    <li><a href="#" onclick="closeMenu()">ショップ</a></li>
  </ul>
</div>

<div class="page-header">
  <span class="page-eyebrow">One Card Reading</span>
  <h1 class="page-title">カードを引く</h1>
  <p class="page-desc">心を静め、問いかけを持ち、一枚のカードを選んでください</p>
</div>

<div class="mode-selector">
  <button class="mode-btn active" onclick="setMode('one')">一枚引き</button>
  <button class="mode-btn" onclick="setMode('three')">三枚引き</button>
</div>

<div class="instruction">
  <p id="instr-text">22枚の大アルカナが並んでいます。直感で一枚を選んでください</p>
</div>

<div class="card-grid" id="cardGrid"></div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-card" id="modalCard">
      <img class="modal-card-img" id="modalImg" src="" alt="" />
    </div>
    <div class="modal-body">
      <p class="modal-eyebrow" id="modalEyebrow"></p>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-subtitle" id="modalSubtitle"></p>
      <div id="revBadge" style="display:none" class="rev-badge">↓ 逆位置</div>
      <div class="modal-divider"></div>
      <div>
        <span class="modal-section-label" id="meaningLabel">正位置の意味</span>
        <p class="modal-text" id="modalMeaning"></p>
      </div>
      <div>
        <span class="modal-section-label">キーワード</span>
        <div class="modal-keywords" id="modalKeywords"></div>
      </div>
      <div>
        <span class="modal-section-label">メッセージ</span>
        <p class="modal-text" id="modalMessage"></p>
      </div>
      <button class="modal-close" onclick="closeOverlay()">閉じる ✕</button>
    </div>
  </div>
</div>

<script>
// ── Major Arcana Data ──
const CARDS = [
  {
    num:'0', name:'愚者', en:'The Fool',
    img: 'images/tarot/00_Fool.jpg',
    upright:'新しい始まり、無限の可能性、自由な精神。恐れを手放し、未知の旅に踏み出す勇気を持つとき。',
    reversed:'無謀、軽率、準備不足。衝動的な行動が思わぬトラブルを招く可能性。',
    keywords:['始まり','自由','冒険','純粋さ','可能性'],
    message:'今こそ一歩を踏み出す時です。完璧な準備を待つのではなく、軽やかな心で新しい扉を開いてください。'
  },
  {
    num:'I', name:'魔術師', en:'The Magician',
    img: 'images/tarot/01_Magician.jpg',

    reversed:'才能の無駄遣い、詐欺、自信の欠如。持っている能力を疑いすぎている。',
    keywords:['意志','創造','スキル','集中','顕現'],

  {
    num:'II', name:'女教皇', en:'The High Priestess',
    img: 'images/tarot/02_High_Priestess.jpg',
    upright:'直感、潜在意識、神秘的な知恵。内なる声に耳を傾け、表に出ていない真実を感じ取る。',

    keywords:['直感','神秘','潜在意識','沈黙','知恵'],
    message:'すべての答えは外にではなく、あなたの内側にあります。静かに座り、深い部分からのメッセージを受け取ってください。'
  },
  {
    num:'III', name:'女帝', en:'The Empress',
    img: 'images/tarot/03_Empress.jpg',
    upright:'豊かさ、母性、自然との調和。創造的エネルギーが満ちあふれ、物事が育ち花開くとき。',
    reversed:'創造性の枯渇、依存、自己愛の欠如。自分自身を大切にすることが必要。',

  {

  {

    img: 'images/tarot/05_Hierophant.jpg',

  {

    img: 'images/tarot/06_Lovers.jpg',

  {

    img: 'images/tarot/07_Chariot.jpg',

  {

let mode = 'one';
let selectedCards = [];
let currentCardData = null;

function setMode(m) {
  mode = m;
  selectedCards = [];
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active', (i===0&&m==='one')||(i===1&&m==='three'));
  });
  document.getElementById('instr-text').textContent =
    m === 'one'
      ? '22枚の大アルカナが並んでいます。直感で一枚を選んでください'
      : '三枚を選んでください — 過去・現在・未来を表します';
  renderCards();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let shuffled = [];

function renderCards() {
  shuffled = shuffle(CARDS);
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  shuffled.forEach((card, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.style.opacity = '0';
    wrap.style.transform = 'translateY(16px)';
    wrap.style.transition = `opacity .5s ease ${i*30}ms, transform .5s ease ${i*30}ms`;
    wrap.innerHTML = `
      <div class="card-flip">
        <div class="card-face card-back">
          <div class="card-back-pattern"></div>
          <div class="card-back-border"></div>
          <div class="card-back-sym">✦</div>
        </div>
        <div class="card-face card-front">
          <div class="card-img-wrap">
            <img src="${card.img}" alt="${card.name}" loading="lazy" />
          </div>
          <div class="card-label">
            <span class="card-label-name">${card.name}</span>
            <span class="card-label-num">${card.en}</span>
          </div>
        </div>
      </div>`;
    wrap.addEventListener('click', () => onCardClick(wrap, card));
    grid.appendChild(wrap);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      wrap.style.opacity = '1';
      wrap.style.transform = 'translateY(0)';
    }));
  });
}

function onCardClick(wrap, card) {
  if (mode === 'one') {
    if (wrap.classList.contains('flipped') || wrap.classList.contains('reversed')) {
      openModal(card, wrap.classList.contains('reversed'));
      return;
    }
    // Flip all others back / disable
    document.querySelectorAll('.card-wrap').forEach(w => {
      if (w !== wrap) w.style.opacity = '0.3';
    });
    const rev = Math.random() < 0.25;
    if (rev) wrap.classList.add('reversed');
    else wrap.classList.add('flipped');
    setTimeout(() => openModal(card, rev), 750);
  } else {
    if (wrap.classList.contains('flipped') || wrap.classList.contains('reversed')) {
      const idx = selectedCards.findIndex(s=>s.card===card);
      const rev = idx>=0 ? selectedCards[idx].rev : false;
      openModal(card, rev);
      return;
    }
    if (selectedCards.length >= 3) return;
    const rev = Math.random() < 0.25;
    if (rev) wrap.classList.add('reversed');
    else wrap.classList.add('flipped');
    selectedCards.push({card, rev});
    if (selectedCards.length === 3) {
      document.querySelectorAll('.card-wrap:not(.flipped):not(.reversed)').forEach(w=>w.style.opacity='0.3');
    }
  }
}

function openModal(card, reversed) {
  currentCardData = {card, reversed};
  const labels = ['過去','現在','未来'];
  let eyebrow = reversed ? '逆位置 · Reversed' : '正位置 · Upright';
  if (mode==='three') {
    const idx = selectedCards.findIndex(s=>s.card===card);
    if (idx>=0) eyebrow = labels[idx] + ' · ' + (reversed?'逆位置':'正位置');
  }
  document.getElementById('modalEyebrow').textContent = eyebrow;
  document.getElementById('modalTitle').textContent = `${card.num}. ${card.name}`;
  document.getElementById('modalSubtitle').textContent = card.en;
  document.getElementById('modalImg').src = card.img;
  document.getElementById('modalImg').alt = card.name;
  document.getElementById('modalCard').className = 'modal-card' + (reversed?' reversed':'');
  document.getElementById('revBadge').style.display = reversed ? 'inline-flex' : 'none';
  document.getElementById('meaningLabel').textContent = reversed ? '逆位置の意味' : '正位置の意味';
  document.getElementById('modalMeaning').textContent = reversed ? card.reversed : card.upright;
  document.getElementById('modalMessage').textContent = card.message;
  const kw = document.getElementById('modalKeywords');
  kw.innerHTML = card.keywords.map(k=>`<span class="kw">${k}</span>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Cursor
const cur=document.getElementById('cur'), ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})();
document.addEventListener('mouseover',e=>{
  if(e.target.closest('a,button,.card-wrap,.modal-close')){
    cur.style.transform='translate(-50%,-50%) scale(2.2)';
    ring.style.borderColor='var(--gold)';ring.style.transform='translate(-50%,-50%) scale(1.4)';
  }else{
    cur.style.transform='translate(-50%,-50%) scale(1)';
    ring.style.borderColor='var(--mouve)';ring.style.transform='translate(-50%,-50%) scale(1)';
  }
});

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay()});

// Init
renderCards();
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('open');
  mobileMenu.classList.toggle('open');
  document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
});

function closeMenu() {
  hamburger.classList.remove('open');
  mobileMenu.classList.remove('open');
  document.body.style.overflow = '';
}
</script>
